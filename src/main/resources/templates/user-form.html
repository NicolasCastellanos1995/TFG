<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar usuario' : 'Crear usuario'">Formulario Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f6fa;
        }

        .form-container{
            max-width:450px;
            margin:80px auto;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="card shadow p-4">

        <h3 class="text-center mb-4"
            th:text="${modoEdicion} ? 'Editar usuario' : 'Crear nuevo usuario'">
            Crear nuevo usuario
        </h3>

        <div th:with="formAction=${modoEdicion} ? '/admin/users/update' : '/admin/users/save'">
            <form th:action="${formAction}"
                  th:object="${user}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="username" class="form-label">Nombre de usuario</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label">Rol</label>
                    <select id="role" th:field="*{role}" class="form-select" required>
                        <option value="">Selecciona un rol</option>
                        <option value="admin">Admin</option>
                        <option value="operario">Operario</option>
                        <option value="supervisor">Supervisor</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           class="form-control"
                           th:required="${!modoEdicion}">
                    <div class="form-text" th:if="${modoEdicion}">
                        Déjala vacía si no quieres cambiar la contraseña.
                    </div>
                </div>

                <div class="mb-4">
                    <label for="active" class="form-label">Estado</label>
                    <select id="active" th:field="*{active}" class="form-select">
                        <option th:value="true">Activo</option>
                        <option th:value="false">Inactivo</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/admin}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit"
                            class="btn btn-primary"
                            th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'">
                        Guardar
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

</body>
</html>
