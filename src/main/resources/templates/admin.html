<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel de Administración</title>

    <!-- Bootstrap -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- Tu CSS -->
    <link rel="stylesheet" href="/css/admin.css" th:href="@{/css/admin.css}">
</head>
<body>

<div class="container py-5">
    <div class="admin-wrapper">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="admin-title">Panel de Administración de Usuarios</h1>
            </div>

            <a th:href="@{/admin/users/new}" class="btn btn-primary btn-create">
                + Crear nuevo usuario
            </a>
        </div>

        <div class="card admin-card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="section-title mb-4">Lista de usuarios</h2>

                <div class="row mb-3">
                    <div class="col-md-6">

                        <form th:action="@{/admin}" method="get" class="d-flex">

                            <input
                                    type="text"
                                    name="keyword"
                                    th:value="${keyword}"
                                    class="form-control me-2"
                                    placeholder="Buscar usuario por nombre o email">

                            <button type="submit" class="btn btn-outline-primary">
                                Buscar
                            </button>

                        </form>

                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 custom-table">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nombre de usuario</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" class="text-center empty-message">
                                No hay usuarios registrados.
                            </td>
                        </tr>

                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.username}">usuario</td>
                            <td th:text="${user.email}">correo@ejemplo.com</td>

                            <td>
                                <span class="role-text" th:text="${user.role}">admin</span>
                            </td>

                            <td>
                                <span th:if="${user.active}" class="badge bg-success">Activo</span>
                                <span th:unless="${user.active}" class="badge bg-secondary">Inactivo</span>
                            </td>

                            <td>
                                <div class="d-flex gap-2 flex-wrap">
                                    <a th:href="@{/admin/edit/{id}(id=${user.id})}"
                                       class="btn btn-sm btn-outline-warning">
                                        Editar
                                    </a>

                                    <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('¿Seguro que quieres eliminar este usuario?');">
                                        Eliminar
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

        <!-- LOGOUT ABAJO CENTRADO -->
        <div class="text-center mt-4">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-primary logout-btn">
                    Cerrar sesión
                </button>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
